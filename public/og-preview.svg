<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fdfaf7"/>
  
  <!-- Decorative blob top right -->
  <circle cx="1100" cy="100" r="180" fill="#fff7f0" opacity="0.6"/>
  
  <!-- Decorative blob bottom left -->
  <circle cx="100" cy="550" r="160" fill="#f0e8dc" opacity="0.5"/>
  
  <!-- Orange accent line -->
  <line x1="200" y1="280" x2="1000" y2="280" stroke="#d4722a" stroke-width="3"/>
  
  <!-- Main logo text: "Aevi" -->
  <text x="600" y="360" font-family="'Playfair Display', serif" font-size="120" font-style="italic" text-anchor="middle" fill="#1a1208" letter-spacing="-2">Aevi</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="'Jost', sans-serif" font-size="24" text-anchor="middle" fill="#a08868" letter-spacing="2">BORN FROM WANDERLUST</text>
  
  <!-- Dots -->
  <circle cx="460" cy="365" r="8" fill="#d4722a"/>
  <circle cx="740" cy="365" r="8" fill="#d4722a"/>
</svg>
